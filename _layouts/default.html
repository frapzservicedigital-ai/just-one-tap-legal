<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{{ page.title | default: "Just One Tap" }}</title>
<link rel="icon" href="{{ '/logo.png' | relative_url }}"/>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#0a0a0e;color:#e8eaf2;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Inter',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

.hero{
  background:linear-gradient(180deg,#6ba7ff 0%,#4d8fff 60%,#3a7eff 100%);
  padding:18px 24px 22px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,.10);
  box-shadow:0 6px 24px rgba(0,80,200,.35);
  display:flex;align-items:center;justify-content:center;gap:12px
}
.logo{
  width:38px;height:38px;
  border-radius:10px;
  display:block;
  box-shadow:0 6px 18px rgba(0,40,120,.4),0 0 0 1px rgba(255,255,255,.12);
  background:#fff;
  overflow:hidden;
  flex-shrink:0
}
.logo img{width:100%;height:100%;display:block;object-fit:cover}
.brand{
  font-size:18px;
  font-weight:800;
  letter-spacing:-0.3px;
  color:#fff;
  margin:0;
  text-shadow:0 2px 10px rgba(0,30,90,.25)
}
.tagline{display:none}

main{
  max-width:720px;
  margin:0 auto;
  padding:48px 24px 80px;
  text-align:center
}
.block{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:20px;
  padding:40px 36px;
  text-align:center;
  box-shadow:0 12px 40px rgba(0,20,60,.25);
  margin-bottom:24px;
  scroll-margin-top:24px
}
.block:last-child{margin-bottom:0}

main h1{
  font-size:30px;
  font-weight:800;
  letter-spacing:-0.4px;
  margin:0 0 6px;
  color:#fff
}
.meta{
  color:rgba(232,234,242,.45);
  font-size:12px;
  letter-spacing:1.4px;
  margin:0 0 28px;
  text-transform:uppercase;
  font-weight:600
}
main h2{
  font-size:17px;
  font-weight:700;
  margin:24px 0 10px;
  color:#fff;
  letter-spacing:-0.1px
}
main p, main li{
  font-size:14.5px;
  line-height:1.65;
  color:rgba(232,234,242,.82);
  margin:0 0 14px
}
main ul, main ol{
  padding-left:0;
  margin:0 0 14px;
  list-style-position:inside
}
main li{margin:5px 0}
main strong{color:#fff;font-weight:700}
main a{color:#7ec3ff;text-decoration:none;border-bottom:1px solid rgba(126,195,255,.3)}
main a:hover{border-bottom-color:rgba(126,195,255,.7)}
main hr{
  border:0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
  margin:24px 0
}
main small{
  display:block;
  margin-top:18px;
  font-size:10.5px;
  line-height:1.55;
  color:rgba(232,234,242,.38)
}
main small strong{color:rgba(255,255,255,.55);font-weight:600}

@media (max-width:540px){
  .hero{padding:36px 18px 42px}
  .brand{font-size:26px}
  main{padding:32px 18px 60px}
  main h1{font-size:26px}
  main h2{font-size:18px}
  main p, main li{font-size:14.5px}
}
</style>
</head>
<body>
<div class="hero">
  <div class="logo"><img src="{{ '/logo.png' | relative_url }}" alt="Just One Tap"/></div>
  <h1 class="brand">Just One Tap</h1>
  <div class="tagline">Translate · Yours Forever</div>
</div>
<main>
{{ content }}
</main>
</body>
</html>
